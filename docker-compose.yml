services:
  chia-sim:
    build: .
    container_name: chia-sim
    ports:
      - "3000:3000"    # Coinset-compatible API + Web UI
    environment:
      AUTO_FARM: "true"          # Auto-farm on new transactions
      BLOCK_INTERVAL: "0"       # Seconds between periodic farms (0 = disabled)
      FARM_ADDRESS: ""           # Override farming reward address (blank = use default)
    # Uncomment for persistent blockchain data across restarts:
    # volumes:
    #   - chia-sim-data:/root/.chia
    restart: unless-stopped

# volumes:
#   chia-sim-data:
